<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Turnaround — Better</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center}.gate{text-align:center;padding:40px}.gate h1{font-size:22px;color:#f8fafc;margin-bottom:4px}.gate h2{font-size:14px;color:#f87171;margin-bottom:20px}.gate p{font-size:12px;color:#64748b;margin-bottom:20px}.gate input{padding:12px 20px;border:2px solid #334155;border-radius:10px;background:#1e293b;color:#f8fafc;font-size:16px;width:280px;text-align:center;outline:none}.gate button{padding:12px 32px;border:none;border-radius:10px;background:#dc2626;color:white;font-size:14px;font-weight:600;cursor:pointer;margin-top:12px;display:block;width:280px;margin-left:auto;margin-right:auto}.gate .err{color:#f87171;font-size:12px;margin-top:8px;display:none}</style>
</head><body>
<div class="gate"><h1>Turnaround Plan</h1><h2>Acesso Restrito</h2>
<input type="password" id="pwd" placeholder="Senha da diretoria" autofocus onkeypress="if(event.key==='Enter')go()">
<button onclick="go()">Acessar</button><div class="err" id="err">Senha incorreta</div></div>
<script>function go(){if(document.getElementById("pwd").value==="BetterVersao2027"){window.location.replace("turnaround-content.html");}else{document.getElementById("pwd").classList.add("error");document.getElementById("err").style.display="block";}}</script>
</body></html>
