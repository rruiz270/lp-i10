<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anhumas · Contatos captados — Instituto i10</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Source+Serif+4:opsz,wght@8..60,400;8..60,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#030B1A;--cyan:#00B4D8;--green:#00E5A0;
  --white:#FFFFFF;--white-80:rgba(255,255,255,.8);--white-50:rgba(255,255,255,.5);
  --white-20:rgba(255,255,255,.2);--white-10:rgba(255,255,255,.1);--white-05:rgba(255,255,255,.05);
  --font-sans:'Inter',system-ui,sans-serif;--font-serif:'Source Serif 4',Georgia,serif;
}
body{font-family:var(--font-sans);color:var(--white);background:var(--navy);
  -webkit-font-smoothing:antialiased;min-height:100vh;padding:clamp(20px,4vw,48px)}
.head{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:16px;margin-bottom:8px}
.title{display:flex;align-items:center;gap:14px}
.title svg{flex-shrink:0}
.title h1{font-family:var(--font-serif);font-size:clamp(22px,3vw,32px);font-weight:700}
.title span{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--white-50);display:block}
.actions{display:flex;gap:10px;flex-wrap:wrap}
.btn{font-size:13px;font-weight:700;text-decoration:none;color:var(--navy);cursor:pointer;
  border:none;border-radius:99px;padding:11px 20px;
  background:linear-gradient(90deg,var(--cyan),var(--green));transition:transform .15s}
.btn:hover{transform:translateY(-1px)}
.btn.ghost{background:transparent;border:1px solid var(--white-20);color:var(--white)}
.bar{display:flex;flex-wrap:wrap;gap:16px;align-items:center;margin:20px 0 24px}
.stat{background:var(--white-05);border:1px solid var(--white-10);border-radius:14px;padding:16px 22px}
.stat b{font-family:var(--font-serif);font-size:32px;font-weight:700;color:var(--green);display:block;line-height:1}
.stat small{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--white-50)}
.search{flex:1;min-width:200px}
.search input{width:100%;font-family:var(--font-sans);font-size:15px;color:var(--white);
  background:var(--white-05);border:1px solid var(--white-20);border-radius:12px;padding:13px 16px}
.search input:focus{outline:none;border-color:var(--cyan)}
.tablewrap{background:var(--white-05);border:1px solid var(--white-10);border-radius:16px;overflow:auto}
table{width:100%;border-collapse:collapse;min-width:760px}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--white-50);
  font-weight:700;padding:14px 18px;border-bottom:1px solid var(--white-10);position:sticky;top:0;background:#0a1424}
td{padding:14px 18px;font-size:14px;border-bottom:1px solid var(--white-05);color:var(--white-80)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
td.nome{color:var(--white);font-weight:600}
td a{color:var(--cyan);text-decoration:none}
td a:hover{text-decoration:underline}
.empty{padding:60px 20px;text-align:center;color:var(--white-50)}
.muted{color:var(--white-50);font-size:13px}
</style>
</head>
<body>

<div class="head">
  <div class="title">
    <svg viewBox="0 0 170 90" width="64" height="34" aria-hidden="true">
      <circle cx="20" cy="50" r="6" fill="#00B4D8"/><circle cx="55" cy="22" r="6" fill="#00E5A0"/>
      <circle cx="90" cy="58" r="6" fill="#00B4D8"/><circle cx="125" cy="34" r="6" fill="#00B4D8"/>
      <circle cx="160" cy="68" r="6" fill="#00E5A0"/>
      <line x1="20" y1="50" x2="55" y2="22" stroke="url(#g)" stroke-width="2.5"/>
      <line x1="55" y1="22" x2="90" y2="58" stroke="url(#g)" stroke-width="2.5"/>
      <line x1="90" y1="58" x2="125" y2="34" stroke="url(#g)" stroke-width="2.5"/>
      <line x1="125" y1="34" x2="160" y2="68" stroke="url(#g)" stroke-width="2.5"/>
      <defs><linearGradient id="g" x1="20" y1="50" x2="160" y2="50" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#00B4D8"/><stop offset="100%" stop-color="#00E5A0"/>
      </linearGradient></defs>
    </svg>
    <div><span>Instituto i10 · Evento Anhumas</span><h1>Contatos captados</h1></div>
  </div>
  <div class="actions">
    <button class="btn ghost" id="refresh">↻ Atualizar</button>
    <a class="btn" href="/api/anhumas?format=csv">⬇ Baixar CSV</a>
  </div>
</div>

<div class="bar">
  <div class="stat"><b id="total">—</b><small>Contatos</small></div>
  <div class="search"><input type="search" id="search" placeholder="Buscar por nome, cidade, cargo, e-mail…"></div>
</div>

<div class="tablewrap">
  <table>
    <thead>
      <tr><th>#</th><th>Nome</th><th>Telefone</th><th>E-mail</th><th>Cidade</th><th>Cargo</th><th>Data</th></tr>
    </thead>
    <tbody id="rows"><tr><td colspan="7" class="empty">Carregando…</td></tr></tbody>
  </table>
</div>

<script>
(function(){
  'use strict';
  var allLeads = [];
  var rowsEl = document.getElementById('rows');
  var totalEl = document.getElementById('total');
  var searchEl = document.getElementById('search');

  function fmtDate(s){
    try{
      var d = new Date(s);
      return d.toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});
    }catch(e){ return s || ''; }
  }
  function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }

  function render(list){
    if(!list.length){
      rowsEl.innerHTML = '<tr><td colspan="7" class="empty">Nenhum contato ainda. Os cadastros aparecem aqui em tempo real.</td></tr>';
      return;
    }
    rowsEl.innerHTML = list.map(function(l){
      var tel = l.telefone ? '<a href="https://wa.me/55'+esc(l.telefone.replace(/\D/g,''))+'" target="_blank" rel="noopener">'+esc(l.telefone)+'</a>' : '<span class="muted">—</span>';
      var mail = l.email ? '<a href="mailto:'+esc(l.email)+'">'+esc(l.email)+'</a>' : '<span class="muted">—</span>';
      return '<tr>'+
        '<td class="muted">'+esc(l.id)+'</td>'+
        '<td class="nome">'+esc(l.nome)+'</td>'+
        '<td>'+tel+'</td>'+
        '<td>'+mail+'</td>'+
        '<td>'+(esc(l.cidade)||'<span class="muted">—</span>')+'</td>'+
        '<td>'+(esc(l.cargo)||'<span class="muted">—</span>')+'</td>'+
        '<td class="muted">'+esc(fmtDate(l.created_at))+'</td>'+
      '</tr>';
    }).join('');
  }

  function applyFilter(){
    var q = searchEl.value.trim().toLowerCase();
    if(!q){ render(allLeads); return; }
    render(allLeads.filter(function(l){
      return [l.nome,l.cidade,l.cargo,l.email,l.telefone].some(function(v){
        return v && String(v).toLowerCase().indexOf(q) !== -1; });
    }));
  }

  function load(){
    rowsEl.innerHTML = '<tr><td colspan="7" class="empty">Carregando…</td></tr>';
    fetch('/api/anhumas', { cache: 'no-store' })
      .then(function(r){ return r.json(); })
      .then(function(d){
        if(!d.ok){ throw new Error(d.error || 'Erro'); }
        allLeads = d.leads || [];
        totalEl.textContent = allLeads.length;
        applyFilter();
      })
      .catch(function(e){
        rowsEl.innerHTML = '<tr><td colspan="7" class="empty">Erro ao carregar: '+esc(e.message)+'</td></tr>';
      });
  }

  searchEl.addEventListener('input', applyFilter);
  document.getElementById('refresh').addEventListener('click', load);
  load();
  setInterval(load, 30000); // atualiza a cada 30s
})();
</script>
</body>
</html>
